<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed In — RRA Month-End Orchestration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-body">
    <div class="login-overlay"></div>
    <div class="login-container">
        <div class="login-card shadow-lg text-center">
            <div class="login-logo mb-3 mx-auto">
                <i class="bi bi-check-circle-fill text-success"></i>
            </div>
            <h2 class="login-title h4">Signed in successfully</h2>
            <p class="text-muted mb-1">{{ session.username }}</p>
            <p class="badge bg-secondary mb-4">{{ session.role }}</p>
            <p class="small text-muted mb-4">
                The orchestration dashboard is <strong>Step 2</strong> and is not built yet.
            </p>
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-box-arrow-right"></i> Sign Out
            </a>
        </div>
    </div>
</body>
</html>
