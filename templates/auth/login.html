<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — RRA Month-End Orchestration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-body">
    <div class="login-overlay"></div>

    <div class="login-container">
        <div class="login-card shadow-lg" role="main">
            <div class="login-header text-center mb-4">
                <div class="login-logo mb-3" aria-hidden="true">
                    <i class="bi bi-diagram-3-fill"></i>
                </div>
                <h1 class="login-title">RRA Month-End Orchestration</h1>
                <p class="login-subtitle">Operations Console</p>
            </div>

            <div id="loginAlert" class="{% if not error %}d-none{% endif %}">
                <div class="alert alert-danger py-2 mb-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>
                    <span id="loginAlertText">{{ error or '' }}</span>
                </div>
            </div>

            <form id="loginForm" method="POST" action="{{ url_for('auth.login') }}" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Enter username" required autofocus autocomplete="username">
                    </div>
                    <div class="invalid-feedback">Username is required.</div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Enter password" required autocomplete="current-password">
                    </div>
                    <div class="invalid-feedback">Password is required.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 login-btn" id="loginBtn">
                    <span class="btn-text"><i class="bi bi-box-arrow-in-right me-1"></i> Sign In</span>
                    <span class="btn-loading d-none">
                        <span class="spinner-border spinner-border-sm me-1" role="status"></span>
                        Signing in...
                    </span>
                </button>
            </form>

            <p class="text-center text-muted small mt-4 mb-0">
                Secure session-based authentication
            </p>
        </div>

        <p class="text-center text-white-50 small mt-3 mb-0">
            Design phase — Step 1 of 10: Login
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
