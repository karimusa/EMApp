{# Sidebar navigation — every item links to a real route or a Coming Soon page. #}
<nav class="sidebar-nav" aria-label="Main navigation">
    <a class="nav-item {% if active_nav == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard.index') }}">
        <i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span>
    </a>
    <a class="nav-item {% if active_nav == 'run_history' %}active{% endif %}" href="{{ url_for('dashboard.run_history') }}">
        <i class="bi bi-clock-history"></i><span>Run History</span>
    </a>
    <a class="nav-item {% if active_nav == 'jobs' %}active{% endif %}" href="{{ url_for('dashboard.agent_jobs') }}">
        <i class="bi bi-hdd-network"></i><span>SQL Agent Jobs</span>
    </a>
    <a class="nav-item {% if active_nav == 'logs' %}active{% endif %}" href="{{ url_for('dashboard.logs') }}">
        <i class="bi bi-terminal"></i><span>Logs</span>
    </a>
    <a class="nav-item {% if active_nav == 'monitoring' %}active{% endif %}" href="{{ url_for('dashboard.monitoring') }}">
        <i class="bi bi-activity"></i><span>Monitoring</span>
    </a>
    <a class="nav-item {% if active_nav == 'validation' %}active{% endif %}" href="{{ url_for('dashboard.validation') }}">
        <i class="bi bi-patch-check"></i><span>Validation</span>
    </a>
    <a class="nav-item {% if active_nav == 'reports' %}active{% endif %}" href="{{ url_for('dashboard.reports') }}">
        <i class="bi bi-file-earmark-bar-graph"></i><span>Reports</span>
        <span class="nav-tag nav-tag--soon">Soon</span>
    </a>
    {% if nav_is_admin %}
    <div class="nav-section">Administration</div>
    <a class="nav-item {% if active_nav == 'users' %}active{% endif %}" href="{{ url_for('admin.users') }}">
        <i class="bi bi-people-fill"></i><span>Users</span>
    </a>
    {% endif %}
    <a class="nav-item {% if active_nav == 'settings' %}active{% endif %}" href="{{ url_for('dashboard.settings') }}">
        <i class="bi bi-gear"></i><span>Settings</span>
    </a>
</nav>
