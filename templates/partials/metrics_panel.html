<div class="metrics-list">
    <h6 class="px-3 pt-3 mb-2 text-muted text-uppercase small">Run Metrics</h6>
    {% for metric in metrics %}
    <div class="metric-item d-flex justify-content-between px-3 py-2">
        <span class="metric-name">{{ metric.metric_name }}</span>
        <span class="metric-value fw-semibold">
            {{ metric.metric_value }}{% if metric.metric_unit %} {{ metric.metric_unit }}{% endif %}
        </span>
    </div>
    {% else %}
    <p class="text-muted small px-3 py-2 mb-0">No metrics available.</p>
    {% endfor %}
</div>
