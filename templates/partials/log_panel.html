<div class="log-entries">
    {% for log in logs %}
    <div class="log-entry log-{{ log.log_level | lower }}">
        <div class="log-meta">
            <span class="log-time">{{ log.logged_at }}</span>
            <span class="badge bg-secondary">{{ log.phase }}</span>
            <span class="log-step">{{ log.step_name }}</span>
        </div>
        <div class="log-message">{{ log.message }}</div>
    </div>
    {% else %}
    <p class="text-muted small p-3 mb-0">No log entries.</p>
    {% endfor %}
</div>
